name: Build iOS (Signed IPA)

on:
  workflow_dispatch:
    inputs:
      build_mode:
        description: 'Build mode'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug
      api_base_url:
        description: 'API Base URL (e.g., https://your-panel.com/api/v1)'
        required: false
        type: string
        default: ''

jobs:
  build:
    name: Build iOS IPA
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true
      
      - name: Get Flutter dependencies
        run: flutter pub get
      
      - name: Install CocoaPods
        run: |
          sudo gem install cocoapods
          pod --version
      
      - name: Install CocoaPods dependencies
        working-directory: ios
        run: |
          # Flutter 会在 pub get 时生成 Podfile，如果不存在则跳过
          if [ -f "Podfile" ]; then
            pod install --repo-update
          else
            echo "Podfile not found. Flutter will generate it during build."
            echo "This is normal for Flutter projects - pod install will be handled automatically."
          fi
      
      - name: Setup Apple Certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          # 创建变量
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          
          # 解码证书
          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > $CERTIFICATE_PATH
          
          # 创建临时 keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          
          # 导入证书
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          
          # 设置代码签名标识
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
      
      - name: Setup Provisioning Profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PROVISIONING_PROFILE_PATH="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROVISIONING_PROFILE_PATH"
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROVISIONING_PROFILE_PATH/profile.mobileprovision"
      
      - name: Build iOS
        run: |
          BUILD_ARGS="--${{ github.event.inputs.build_mode || 'release' }}"
          if [ -n "${{ github.event.inputs.api_base_url }}" ]; then
            BUILD_ARGS="$BUILD_ARGS --dart-define=API_BASE_URL=${{ github.event.inputs.api_base_url }}"
          elif [ -n "${{ secrets.API_BASE_URL }}" ]; then
            BUILD_ARGS="$BUILD_ARGS --dart-define=API_BASE_URL=${{ secrets.API_BASE_URL }}"
          fi
          flutter build ios $BUILD_ARGS
        env:
          FLUTTER_BUILD_MODE: ${{ github.event.inputs.build_mode || 'release' }}
          CODE_SIGN_IDENTITY: ${{ secrets.IOS_CODE_SIGN_IDENTITY }}
          PROVISIONING_PROFILE_SPECIFIER: ${{ secrets.IOS_PROVISIONING_PROFILE_SPECIFIER }}
      
      - name: Create Xcode Archive
        working-directory: ios
        run: |
          xcodebuild clean archive \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration ${{ github.event.inputs.build_mode == 'debug' && 'Debug' || 'Release' }} \
            -archivePath build/Runner.xcarchive \
            -allowProvisioningUpdates
        env:
          CODE_SIGN_IDENTITY: ${{ secrets.IOS_CODE_SIGN_IDENTITY }}
          PROVISIONING_PROFILE_SPECIFIER: ${{ secrets.IOS_PROVISIONING_PROFILE_SPECIFIER }}
      
      - name: Export IPA
        working-directory: ios
        run: |
          xcodebuild -exportArchive \
            -archivePath build/Runner.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ExportOptions.plist \
            -allowProvisioningUpdates
      
      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: flux-ios-${{ github.event.inputs.build_mode || 'release' }}-${{ github.run_number }}
          path: ios/build/ipa/*.ipa
          retention-days: 30
      
      - name: Build summary
        run: |
          echo "## iOS IPA Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Build Mode: ${{ github.event.inputs.build_mode || 'release' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Flutter Version: $(flutter --version | head -n 1)" >> $GITHUB_STEP_SUMMARY
          echo "- Build Number: ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ github.event.inputs.api_base_url }}" ]; then
            echo "- API Base URL: ${{ github.event.inputs.api_base_url }}" >> $GITHUB_STEP_SUMMARY
          elif [ -n "${{ secrets.API_BASE_URL }}" ]; then
            echo "- API Base URL: Configured (from secrets)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- API Base URL: Using default value" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Download" >> $GITHUB_STEP_SUMMARY
          echo "IPA file is available in the artifacts section." >> $GITHUB_STEP_SUMMARY

